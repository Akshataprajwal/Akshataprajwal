<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Akshata Mashetti profile banner</title>
  <desc id="desc">Light themed animated banner for Akshata Mashetti, full stack and AI developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0284c7"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g opacity="0.42" filter="url(#softGlow)">
    <circle cx="138" cy="78" r="72" fill="#7dd3fc">
      <animate attributeName="r" values="64;84;64" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1018" cy="230" r="95" fill="#5eead4">
      <animate attributeName="cy" values="230;206;230" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="906" cy="78" r="56" fill="#c4b5fd">
      <animate attributeName="cx" values="906;952;906" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M92 236 C260 128 388 264 548 160 S838 80 1076 168" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.65">
    <animate attributeName="stroke-dasharray" values="16 28;28 16;16 28" dur="6s" repeatCount="indefinite"/>
  </path>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="124" fill="#0f172a" font-size="48" font-weight="700">Akshata Mashetti</text>
    <text x="600" y="170" fill="#334155" font-size="24" font-weight="500">Full Stack Developer | AI Developer | Open Source Learner</text>
    <text x="600" y="214" fill="#475569" font-size="18">React - Next.js - Node.js - TypeScript - Python - AI Systems</text>
  </g>

  <g transform="translate(378 246)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect width="102" height="34" rx="17" fill="#ffffff" stroke="#bae6fd"/>
    <text x="51" y="22" text-anchor="middle" fill="#0284c7">Bangalore</text>
    <rect x="122" width="118" height="34" rx="17" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="181" y="22" text-anchor="middle" fill="#7c3aed">MCA Student</text>
    <rect x="260" width="184" height="34" rx="17" fill="#ffffff" stroke="#99f6e4"/>
    <text x="352" y="22" text-anchor="middle" fill="#0f766e">Building with AI</text>
  </g>
</svg>
