<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Akshata Mashetti profile banner</title>
  <desc id="desc">Dark themed animated banner for Akshata Mashetti, full stack and AI developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#10233f"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g opacity="0.38" filter="url(#softGlow)">
    <circle cx="145" cy="84" r="72" fill="#58a6ff">
      <animate attributeName="r" values="64;84;64" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1016" cy="230" r="95" fill="#2dd4bf">
      <animate attributeName="cy" values="230;206;230" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="902" cy="72" r="54" fill="#a78bfa">
      <animate attributeName="cx" values="902;948;902" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M92 236 C260 128 388 264 548 160 S838 80 1076 168" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.72">
    <animate attributeName="stroke-dasharray" values="16 28;28 16;16 28" dur="6s" repeatCount="indefinite"/>
  </path>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="124" fill="#f0f6fc" font-size="48" font-weight="700">Akshata Mashetti</text>
    <text x="600" y="170" fill="#c9d1d9" font-size="24" font-weight="500">Full Stack Developer | AI Developer | Open Source Learner</text>
    <text x="600" y="214" fill="#8b949e" font-size="18">React - Next.js - Node.js - TypeScript - Python - AI Systems</text>
  </g>

  <g transform="translate(378 246)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect width="102" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="51" y="22" text-anchor="middle" fill="#58a6ff">Bangalore</text>
    <rect x="122" width="118" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="181" y="22" text-anchor="middle" fill="#a78bfa">MCA Student</text>
    <rect x="260" width="184" height="34" rx="17" fill="#161b22" stroke="#30363d"/>
    <text x="352" y="22" text-anchor="middle" fill="#2dd4bf">Building with AI</text>
  </g>
</svg>
